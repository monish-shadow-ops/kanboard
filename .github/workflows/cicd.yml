name: Kanboard CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    name: Unit Test Stage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanboard_unit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    outputs:
      test_message: ${{ steps.test_result.outputs.message }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP using Marketplace Action
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_pgsql, pgsql, gd, xml, curl, zip, json, ldap
          tools: composer

      - name: Install Composer dependencies using Marketplace Action
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--prefer-dist --no-progress --no-interaction"

      - name: Run PostgreSQL PHPUnit tests using Marketplace Action
        id: unit_test
        uses: php-actions/phpunit@v4
        env:
          DB_HOSTNAME: postgres
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: kanboard_unit_test
        with:
          configuration: tests/units.postgres.xml
          php_version: "8.4"
          php_extensions: "pdo_pgsql pgsql ldap"
          bootstrap: vendor/autoload.php
          filter: "/^(?!.*testSanitizePath).*$/"

      - name: Set test result message
        id: test_result
        if: always()
        run: |
          if [ "${{ steps.unit_test.outcome }}" = "success" ]; then
            echo "message=Unit Test Passed: Kanboard PostgreSQL PHPUnit tests completed successfully" >> $GITHUB_OUTPUT
          else
            echo "message=Unit Test Failed: Kanboard PostgreSQL PHPUnit tests failed" >> $GITHUB_OUTPUT
          fi
