name: Kanboard CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kanboard-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"

  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: kanboard_unit_test

  DB_HOSTNAME: 127.0.0.1
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_NAME: kanboard_unit_test

  LOCAL_IMAGE_NAME: kanboard-local
  LOCAL_IMAGE_TAG: scan-test

  DOCKERHUB_NAMESPACE: monishs2722
  IMAGE_REPOSITORY: kanboard-cicd

jobs:
  test:
    name: Unit Test Stage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kanboard_unit_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    outputs:
      test_message: ${{ steps.test_result.outputs.message }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_pgsql, pgsql, gd, xml, curl, zip, json, ldap
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--prefer-dist --no-progress --no-interaction"

      - name: Select lightweight unit test files
        id: select_tests
        run: |
          set -e

          find tests/units/Model tests/units/Core tests/units/Validator \
            -type f \
            -name "*Test.php" \
            | sort \
            | head -n 8 > selected-tests.txt

          echo "Selected test files:"
          cat selected-tests.txt

          if [ ! -s selected-tests.txt ]; then
            echo "No test files selected"
            exit 1
          fi

      - name: Run lightweight PostgreSQL unit tests
        id: unit_test
        run: |
          set -e

          php vendor/bin/phpunit \
            -c tests/units.postgres.xml \
            $(cat selected-tests.txt)

      - name: Set test result message
        id: test_result
        if: always()
        run: |
          if [ "${{ steps.unit_test.outcome }}" = "success" ]; then
            echo "message=Unit Test Passed: Lightweight Kanboard PostgreSQL unit tests completed successfully" >> "$GITHUB_OUTPUT"
          else
            echo "message=Unit Test Failed: Lightweight Kanboard PostgreSQL unit tests failed" >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Scan Stage
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    outputs:
      scan_message: ${{ steps.scan_result.outputs.message }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: |
            VERSION=scan-test
          tags: ${{ env.LOCAL_IMAGE_NAME }}:${{ env.LOCAL_IMAGE_TAG }}

      - name: Scan Docker image with Trivy
        id: trivy_image_scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE_NAME }}:${{ env.LOCAL_IMAGE_TAG }}
          scan-type: image
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 0

      - name: Scan repository filesystem with Trivy
        id: trivy_fs_scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 0

      - name: Set scan result message
        id: scan_result
        if: always()
        run: |
          if [ "${{ steps.trivy_image_scan.outcome }}" = "success" ] && [ "${{ steps.trivy_fs_scan.outcome }}" = "success" ]; then
            echo "message=Scan Completed: Docker image and repository filesystem scans completed with Trivy" >> "$GITHUB_OUTPUT"
          else
            echo "message=Scan Failed: One or more Trivy scans failed" >> "$GITHUB_OUTPUT"
          fi

  versioning:
    name: Versioning Automation Stage
    runs-on: ubuntu-latest
    needs: scan
    timeout-minutes: 5

    outputs:
      version: ${{ steps.version.outputs.new_tag }}
      version_message: ${{ steps.version_result.outputs.message }}

    steps:
      - name: Checkout source code with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create semantic version tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          fetch_all_tags: true

      - name: Set version result message
        id: version_result
        run: |
          echo "message=Version Created: ${{ steps.version.outputs.new_tag }}" >> "$GITHUB_OUTPUT"

  build_push:
    name: Build and Push Stage
    runs-on: ubuntu-latest
    needs: versioning
    timeout-minutes: 25

    outputs:
      image: ${{ steps.image_info.outputs.image }}
      build_message: ${{ steps.image_info.outputs.message }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Kanboard Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ needs.versioning.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kanboard CI/CD
            org.opencontainers.image.description=Kanboard custom image built through GitHub Actions CI/CD
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:latest

      - name: Set build push result message
        id: image_info
        run: |
          IMAGE="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}"

          echo "Image built and pushed: $IMAGE"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "message=Build Push Completed: $IMAGE pushed to Docker Hub" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2 Stage
    runs-on: ubuntu-latest
    needs:
      - versioning
      - build_push
    timeout-minutes: 10

    outputs:
      deploy_message: ${{ steps.deploy_result.outputs.message }}

    steps:
      - name: Deploy Docker image to EC2
        id: deploy_app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}"

            echo "Deploying image: $IMAGE"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            docker pull "$IMAGE"

            docker stop kanboard || true
            docker rm kanboard || true

            docker run -d \
              --name kanboard \
              --network kanboard-net \
              --restart always \
              -p 80:80 \
              -p 443:443 \
              -e DATABASE_URL=postgres://kanboard:kanboard-secret@kanboard-db/kanboard \
              -v kanboard-data:/var/www/app/data \
              -v kanboard-plugins:/var/www/app/plugins \
              -v kanboard-certs:/etc/nginx/ssl \
              "$IMAGE"

            sleep 15

            curl -s http://localhost/healthcheck.php | grep "Database connection is OK"

      - name: Set deploy result message
        id: deploy_result
        if: always()
        run: |
          if [ "${{ steps.deploy_app.outcome }}" = "success" ]; then
            echo "message=Deploy Passed: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }} deployed to EC2 successfully" >> "$GITHUB_OUTPUT"
          else
            echo "message=Deploy Failed: EC2 deployment failed for ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  slack_notification:
    name: Final Slack Notification
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - scan
      - versioning
      - build_push
      - deploy
    timeout-minutes: 5

    steps:
      - name: Send final Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Kanboard CI/CD Pipeline Completed\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nVersion: ${{ needs.versioning.outputs.version }}\nImage: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}\n\n🧪 Test Stage: ${{ needs.test.outputs.test_message }}\n🔍 Scan Stage: ${{ needs.scan.outputs.scan_message }}\n🏷️ Versioning Stage: ${{ needs.versioning.outputs.version_message }}\n📦 Build & Push Stage: ${{ needs.build_push.outputs.build_message }}\n☁️ Deploy Stage: ${{ needs.deploy.outputs.deploy_message }}\n\nJob Results:\nTest: ${{ needs.test.result }}\nScan: ${{ needs.scan.result }}\nVersioning: ${{ needs.versioning.result }}\nBuild Push: ${{ needs.build_push.result }}\nDeploy: ${{ needs.deploy.result }}"
            }
