name: Kanboard CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kanboard-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_NAMESPACE: monishs2722
  IMAGE_REPOSITORY: kanboard-cicd
  SOURCE_ARTIFACT: kanboard-source.tar

jobs:
  prepare_source:
    name: Checkout and Upload Source
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Package source code
        run: |
          tar --exclude='./kanboard-source.tar' -cf kanboard-source.tar .

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SOURCE_ARTIFACT }}
          path: kanboard-source.tar
          archive: false
          retention-days: 1

  test:
    name: Unit Test Stage
    runs-on: [self-hosted, linux, x64]
    needs: prepare_source
    timeout-minutes: 10

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanboard_unit_test
      DB_HOSTNAME: 127.0.0.1
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: kanboard_unit_test

    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kanboard_unit_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT }}

      - name: Extract source code
        run: |
          tar -xf kanboard-source.tar
          rm kanboard-source.tar

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_pgsql, pgsql, gd, xml, curl, zip, json, ldap
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        with:
          composer-options: "--prefer-dist --no-progress --no-interaction"

      - name: Run lightweight PostgreSQL unit tests
        run: |
          set -e

          find tests/units/Model tests/units/Core tests/units/Validator \
            -type f \
            -name "*Test.php" \
            | sort \
            | head -n 8 > selected-tests.txt

          echo "Selected test files:"
          cat selected-tests.txt

          test -s selected-tests.txt

          php vendor/bin/phpunit \
            -c tests/units.postgres.xml \
            $(cat selected-tests.txt)

  scan:
    name: Scan Stage
    runs-on: [self-hosted, linux, x64]
    needs: test
    timeout-minutes: 20

    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT }}

      - name: Extract source code
        run: |
          tar -xf kanboard-source.tar
          rm kanboard-source.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          build-args: VERSION=scan-test
          tags: kanboard-local:scan-test

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kanboard-local:scan-test
          scan-type: image
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 0

      - name: Scan repository filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 0

  versioning:
    name: Versioning Automation Stage
    runs-on: [self-hosted, linux, x64]
    needs: scan
    timeout-minutes: 5

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT }}

      - name: Extract source code
        run: |
          tar -xf kanboard-source.tar
          rm kanboard-source.tar
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create semantic version tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          fetch_all_tags: true

  build_push:
    name: Build and Push Stage
    runs-on: [self-hosted, linux, x64]
    needs: versioning
    timeout-minutes: 25

    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Download source artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SOURCE_ARTIFACT }}

      - name: Extract source code
        run: |
          tar -xf kanboard-source.tar
          rm kanboard-source.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Kanboard Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: VERSION=${{ needs.versioning.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kanboard CI/CD
            org.opencontainers.image.description=Kanboard custom image built through GitHub Actions CI/CD
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:latest

  deploy:
    name: Deploy to EC2 Stage
    runs-on: [self-hosted, linux, x64]
    needs:
      - versioning
      - build_push
    timeout-minutes: 10

    steps:
      - name: Deploy Docker image to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}"
            echo "Deploying image: $IMAGE"

            docker logout || true

            echo "Logging in to Docker Hub..."
            for i in 1 2 3; do
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
                -u "${{ secrets.DOCKERHUB_USERNAME }}" \
                --password-stdin && break

              echo "Docker login failed. Retrying in 10 seconds..."
              sleep 10
            done

            echo "Pulling Docker image..."
            for i in 1 2 3; do
              docker pull "$IMAGE" && break

              echo "Docker pull failed. Retrying in 10 seconds..."
              sleep 10
            done

            docker stop kanboard || true
            docker rm kanboard || true

            docker run -d \
              --name kanboard \
              --network kanboard-net \
              --restart always \
              -p 80:80 \
              -p 443:443 \
              -e DATABASE_URL=postgres://kanboard:kanboard-secret@kanboard-db/kanboard \
              -v kanboard-data:/var/www/app/data \
              -v kanboard-plugins:/var/www/app/plugins \
              -v kanboard-certs:/etc/nginx/ssl \
              "$IMAGE"

            sleep 15
            curl -s http://localhost/healthcheck.php | grep "Database connection is OK"

  slack_notification:
    name: Final Slack Notification
    runs-on: [self-hosted, linux, x64]
    if: always()
    needs:
      - prepare_source
      - test
      - scan
      - versioning
      - build_push
      - deploy
    timeout-minutes: 5

    steps:
      - name: Send final Slack notification
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Kanboard CI/CD Pipeline Completed\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nVersion: ${{ needs.versioning.outputs.version }}\nImage: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.versioning.outputs.version }}\n\n📥 Source Stage: ${{ needs.prepare_source.result }}\n🧪 Test Stage: ${{ needs.test.result }}\n🔍 Scan Stage: ${{ needs.scan.result }}\n🏷️ Versioning Stage: ${{ needs.versioning.result }}\n📦 Build & Push Stage: ${{ needs.build_push.result }}\n☁️ Deploy Stage: ${{ needs.deploy.result }}"
            }
